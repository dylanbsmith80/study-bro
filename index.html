<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#050505">
  <title>Study Bro</title>
  <style>
    :root {
      --black: #050505;
      --white: #ffffff;
      --paper: #fff7df;
      --paper-deep: #f0dfb8;
      --paper-line: rgba(5, 5, 5, 0.06);
      --muted: #665f51;
      --yellow: #ffd43b;
      --note-pink: #f3a0d8;
      --note-blue: #72b8ff;
      --lime: #a8d81f;
      --green: #c9f47a;
      --green-dark: #315f05;
      --red: #ff4d32;
      --red-soft: #ffd0c9;
      --red-dark: #8b1111;
      --purple: #6f3fa0;
      --wood: #8b5226;
      --ink-soft: rgba(5, 5, 5, 0.72);
      --border: 3px solid var(--black);
      --radius: 18px;
      --shadow: 7px 7px 0 var(--black);
      --shadow-soft: 5px 5px 0 rgba(5, 5, 5, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        repeating-linear-gradient(0deg, transparent 0 31px, var(--paper-line) 31px 32px),
        repeating-linear-gradient(90deg, rgba(255, 212, 59, 0.08) 0 1px, transparent 1px 76px),
        linear-gradient(180deg, #fff9e9 0%, var(--paper) 54%, #f4e2bb 100%);
      color: var(--black);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        repeating-linear-gradient(8deg, transparent 0 42px, rgba(5, 5, 5, 0.025) 42px 43px),
        repeating-linear-gradient(96deg, transparent 0 64px, rgba(168, 216, 31, 0.06) 64px 65px);
      opacity: 0.75;
    }

    button {
      font: inherit;
    }

    .app-header {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      background:
        linear-gradient(90deg, #16110d 0%, #22150d 56%, #32180e 100%);
      color: var(--white);
      padding: 16px clamp(18px, 5vw, 64px);
      border-bottom: 5px solid var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .app-header::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.045) 0 1px, transparent 1px 28px),
        linear-gradient(0deg, rgba(255, 212, 59, 0.12), transparent 62%);
      opacity: 0.72;
    }

    .brand-lockup {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      position: relative;
      flex: 0 0 74px;
      width: 74px;
      height: 74px;
      overflow: hidden;
      border: 3px solid var(--black);
      border-radius: 19px;
      background:
        linear-gradient(135deg, var(--lime) 0 48%, var(--yellow) 48% 100%);
      color: var(--black);
      display: grid;
      place-items: center;
      box-shadow: 5px 5px 0 var(--yellow);
      font-size: 1.2rem;
      font-weight: 950;
      letter-spacing: 0;
      transform: rotate(-2deg);
    }

    .logo-mark img {
      position: absolute;
      left: -47%;
      top: -18%;
      width: 188%;
      height: 188%;
      object-fit: cover;
    }

    .brand-copy {
      min-width: 0;
      display: grid;
      gap: 5px;
    }

    .brand {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.25rem);
      line-height: 1;
      letter-spacing: -0.035em;
      text-shadow: 3px 3px 0 var(--black);
    }

    .brand-tagline {
      width: fit-content;
      padding: 4px 9px;
      border: 2px solid var(--black);
      border-radius: 3px;
      background: var(--yellow);
      color: var(--black);
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.45);
      font-size: 0.72rem;
      font-weight: 950;
      letter-spacing: 0;
      transform: rotate(-1deg);
    }

    .deck-label {
      padding: 8px 12px;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff3bf;
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .deck-title {
      color: var(--white);
    }

    .shell {
      width: min(100% - 32px, 960px);
      margin: 28px auto 64px;
    }

    .shell.stack-shell {
      width: min(100% - 32px, 1180px);
    }

    .tabs {
      width: fit-content;
      max-width: 100%;
      margin: 0 auto 24px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      display: flex;
      gap: 8px;
    }

    .tab {
      min-width: 110px;
      padding: 11px 18px 13px;
      border: var(--border);
      border-radius: 14px 14px 6px 6px;
      background: var(--white);
      color: var(--black);
      font-weight: 850;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--black);
      transition: transform 120ms ease, box-shadow 120ms ease, background 160ms ease, color 160ms ease;
    }

    .tab[data-mode="viewCards"] { background: var(--lime); }
    .tab[data-mode="flashcards"] { background: var(--yellow); }
    .tab[data-mode="learn"] { background: var(--green); }
    .tab[data-mode="match"] { background: var(--note-blue); }
    .tab[data-mode="test"] { background: var(--note-pink); }
    .tab[data-mode="stack"] { background: var(--red-soft); }

    .tab:hover,
    .tab:focus-visible {
      transform: translate(-1px, -2px);
      box-shadow: 5px 6px 0 var(--black);
      outline: none;
    }

    .tab.active {
      background: var(--black);
      color: var(--white);
      transform: translateY(-4px);
      box-shadow: 4px 8px 0 var(--yellow);
    }

    .progress-track {
      height: 14px;
      margin-bottom: 24px;
      overflow: hidden;
      border: var(--border);
      border-radius: 999px;
      background:
        repeating-linear-gradient(90deg, rgba(5, 5, 5, 0.08) 0 1px, transparent 1px 18px),
        var(--white);
      box-shadow: 4px 4px 0 rgba(5, 5, 5, 0.18);
    }

    .progress-fill {
      width: 0;
      height: 100%;
      background:
        repeating-linear-gradient(-45deg, rgba(255, 255, 255, 0.28) 0 8px, transparent 8px 16px),
        var(--lime);
      transition: width 240ms ease;
    }

    .deck-message {
      margin-bottom: 20px;
      padding: 14px 16px;
      border: var(--border);
      border-radius: 14px;
      background: var(--red-soft);
      color: var(--red-dark);
      box-shadow: var(--shadow-soft);
      font-weight: 850;
      line-height: 1.4;
    }

    .deck-message[hidden] {
      display: none;
    }

    .mode-panel {
      display: none;
    }

    .mode-panel.active {
      display: block;
      animation: appear 220ms ease;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .status-row {
      min-height: 34px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .status-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stat {
      padding: 6px 11px;
      border: var(--border);
      border-radius: 6px;
      background: var(--yellow);
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.2);
      font-weight: 900;
    }

    .status-group .stat:nth-child(2n) {
      background: var(--green);
      transform: rotate(1deg);
    }

    .status-group .stat:nth-child(3n) {
      background: var(--note-pink);
      transform: rotate(-1deg);
    }

    .study-card {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 360px;
      padding: clamp(28px, 7vw, 64px);
      border: var(--border);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255, 77, 50, 0.16) 0 4px, transparent 4px 100%),
        repeating-linear-gradient(0deg, transparent 0 36px, rgba(5, 5, 5, 0.07) 36px 37px),
        #fffdf3;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .study-card::before {
      content: "";
      position: absolute;
      inset: 14px auto 14px 24px;
      width: 3px;
      border-radius: 999px;
      background: var(--red);
      opacity: 0.72;
    }

    .study-card::after {
      content: "";
      position: absolute;
      top: 16px;
      right: 20px;
      width: 80px;
      height: 18px;
      border: 2px solid var(--black);
      background:
        repeating-linear-gradient(90deg, rgba(5, 5, 5, 0.18) 0 2px, transparent 2px 10px),
        var(--yellow);
      transform: rotate(4deg);
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.18);
    }

    .flashcard {
      position: relative;
      cursor: pointer;
      user-select: none;
      perspective: 1000px;
      transform-style: preserve-3d;
      will-change: transform;
    }

    .flashcard.flipping-out {
      animation: flashcardFlipOut 150ms ease-in forwards;
    }

    .flashcard.flipping-in {
      animation: flashcardFlipIn 170ms ease-out;
    }

    .flashcard:focus-visible {
      outline: 4px solid var(--yellow);
      outline-offset: 4px;
    }

    @keyframes flashcardFlipOut {
      from { transform: rotateY(0deg) scale(1); }
      to { transform: rotateY(88deg) scale(0.985); }
    }

    @keyframes flashcardFlipIn {
      from { transform: rotateY(-88deg) scale(0.985); }
      to { transform: rotateY(0deg) scale(1); }
    }

    .badge {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      margin-bottom: 22px;
      padding: 5px 10px;
      border: 2px solid var(--black);
      border-radius: 5px;
      background: var(--lime);
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.18);
      font-size: 0.68rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transform: rotate(-1deg);
    }

    .card-copy {
      position: relative;
      z-index: 1;
      margin: 0;
      max-width: 720px;
      font-size: clamp(1.65rem, 5vw, 3.2rem);
      font-weight: 850;
      line-height: 1.12;
      letter-spacing: -0.035em;
    }

    .card-image {
      position: relative;
      z-index: 1;
      display: block;
      width: auto;
      max-width: min(100%, 360px);
      max-height: 190px;
      margin: 0 auto 18px;
      border: var(--border);
      border-radius: 14px;
      background: var(--white);
      box-shadow: 4px 4px 0 rgba(5, 5, 5, 0.22);
      object-fit: contain;
    }

    [data-enlarge-card-image] {
      cursor: zoom-in;
    }

    [data-enlarge-card-image]:focus-visible {
      outline: 4px solid var(--yellow);
      outline-offset: 4px;
    }

    .image-enlarge-hint {
      position: relative;
      z-index: 1;
      margin: -8px 0 12px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 850;
    }

    body.image-viewer-open {
      overflow: hidden;
    }

    .image-viewer {
      position: fixed;
      inset: 0;
      z-index: 1000;
      padding: 24px;
      background: rgba(5, 5, 5, 0.84);
      display: grid;
      place-items: center;
    }

    .image-viewer[hidden] {
      display: none;
    }

    .image-viewer-dialog {
      position: relative;
      width: min(94vw, 1100px, calc(100vw - 48px));
      max-height: 92dvh;
      padding: 52px 20px 20px;
      border: var(--border);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 9px 9px 0 var(--yellow);
      display: grid;
      place-items: center;
      gap: 12px;
    }

    .image-viewer-image {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: calc(92dvh - 112px);
      border: 2px solid var(--black);
      border-radius: 12px;
      background: var(--white);
      object-fit: contain;
    }

    .image-viewer-caption {
      margin: 0;
      color: var(--muted);
      font-weight: 850;
      text-align: center;
    }

    .image-viewer-close {
      position: absolute;
      top: 10px;
      right: 10px;
      min-height: 38px;
      padding: 7px 12px;
      border: 2px solid var(--black);
      border-radius: 9px;
      background: var(--white);
      color: var(--black);
      font-weight: 950;
      cursor: pointer;
    }

    .image-viewer-close:hover,
    .image-viewer-close:focus-visible {
      outline: 4px solid var(--yellow);
      outline-offset: 2px;
    }

    .definition-copy {
      font-size: clamp(1.25rem, 3.4vw, 2rem);
      line-height: 1.35;
      letter-spacing: -0.02em;
    }

    .flip-note {
      position: absolute;
      z-index: 1;
      right: 18px;
      bottom: 15px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 750;
    }

    .actions {
      margin-top: 24px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .btn {
      min-height: 52px;
      padding: 12px 20px;
      border: var(--border);
      border-radius: 12px;
      background: #fffdf3;
      color: var(--black);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--black);
      transition: transform 100ms ease, box-shadow 100ms ease, background 140ms ease;
    }

    .btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 6px 6px 0 var(--black);
    }

    .btn:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--black);
    }

    .btn:focus-visible,
    .answer:focus-visible,
    .test-option:focus-visible,
    .test-answer-chip:focus-visible,
    .test-drop-zone:focus-visible,
    .stack-answer:focus-visible,
    .match-card:focus-visible {
      outline: 4px solid var(--yellow);
      outline-offset: 3px;
    }

    .btn-dark {
      background: var(--black);
      color: var(--white);
      box-shadow: 4px 4px 0 var(--red);
    }

    .btn-yellow {
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.35), transparent 64%),
        var(--yellow);
    }

    .learn-prompt {
      min-height: 210px;
      margin-bottom: 18px;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .learn-controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .learn-feedback {
      min-height: 24px;
      margin: 14px 0 0;
      color: var(--muted);
      font-weight: 820;
      line-height: 1.35;
    }

    .learn-feedback strong {
      color: var(--black);
    }

    .answer {
      min-height: 94px;
      padding: 18px;
      border: var(--border);
      border-radius: 13px;
      background:
        repeating-linear-gradient(0deg, transparent 0 28px, rgba(5, 5, 5, 0.05) 28px 29px),
        #fffdf3;
      color: var(--black);
      font-weight: 750;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
      transition: transform 120ms ease, box-shadow 120ms ease, background 150ms ease;
    }

    .answer:hover:not(:disabled) {
      transform: translate(-1px, -2px);
      box-shadow: 6px 6px 0 rgba(5, 5, 5, 0.22);
    }

    .answer:disabled {
      cursor: default;
      opacity: 1;
    }

    .answer.correct {
      border-color: var(--green-dark);
      background: var(--green);
      color: var(--green-dark);
    }

    .answer.wrong {
      border-color: var(--red-dark);
      background: var(--red-soft);
      color: var(--red-dark);
    }

    .view-cards-list {
      display: grid;
      gap: 12px;
    }

    .view-cards-toolbar {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .local-save-status {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
    }

    .card-editor {
      margin-bottom: 18px;
      padding: 18px;
      border: var(--border);
      border-radius: 14px;
      background:
        repeating-linear-gradient(0deg, transparent 0 30px, rgba(5, 5, 5, 0.045) 30px 31px),
        #fffdf3;
      box-shadow: var(--shadow-soft);
    }

    .card-editor h2 {
      margin: 0 0 14px;
      font-size: 1.25rem;
      letter-spacing: -0.025em;
    }

    .card-editor-fields {
      display: grid;
      grid-template-columns: minmax(180px, 0.42fr) minmax(0, 1fr);
      gap: 12px;
    }

    .card-editor-field {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .card-editor-field input,
    .card-editor-field textarea {
      width: 100%;
      min-height: 48px;
      padding: 11px 12px;
      border: var(--border);
      border-radius: 10px;
      background: var(--white);
      color: var(--black);
      font: inherit;
      font-weight: 720;
      letter-spacing: 0;
      line-height: 1.35;
      text-transform: none;
    }

    .card-editor-field textarea {
      min-height: 82px;
      resize: vertical;
    }

    .card-image-picker {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(180px, 0.42fr) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .card-image-picker input[type="file"] {
      min-height: 48px;
      padding: 9px;
      border: var(--border);
      border-radius: 10px;
      background: var(--white);
      color: var(--black);
      font: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      text-transform: none;
    }

    .card-image-preview {
      min-height: 88px;
      padding: 10px;
      border: 2px dashed var(--black);
      border-radius: 12px;
      background: rgba(255, 212, 59, 0.12);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 0.82rem;
      font-weight: 800;
      text-align: center;
    }

    .card-image-preview img {
      display: block;
      width: auto;
      max-width: 180px;
      max-height: 120px;
      border: 2px solid var(--black);
      border-radius: 9px;
      background: var(--white);
      object-fit: contain;
    }

    .card-image-preview[aria-busy="true"] {
      opacity: 0.68;
    }

    .card-editor-field input:focus,
    .card-editor-field textarea:focus,
    .card-image-picker input[type="file"]:focus {
      outline: 4px solid var(--yellow);
      outline-offset: 2px;
    }

    .card-editor-actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .view-card-row {
      overflow: hidden;
      border: var(--border);
      border-radius: 14px;
      background:
        repeating-linear-gradient(0deg, transparent 0 30px, rgba(5, 5, 5, 0.045) 30px 31px),
        #fffdf3;
      box-shadow: var(--shadow-soft);
      display: grid;
      grid-template-columns: minmax(170px, 0.38fr) minmax(0, 1fr) auto;
    }

    .view-card-term,
    .view-card-definition {
      padding: 16px 18px;
      line-height: 1.35;
    }

    .view-card-term {
      border-right: var(--border);
      background: var(--yellow);
      font-weight: 950;
    }

    .view-card-definition {
      color: var(--ink-soft);
      font-weight: 720;
    }

    .view-card-image {
      display: block;
      width: auto;
      max-width: 150px;
      max-height: 110px;
      margin: 10px 18px 14px;
      border: 2px solid var(--black);
      border-radius: 10px;
      background: var(--white);
      object-fit: contain;
    }

    .view-card-actions {
      padding: 10px;
      border-left: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .delete-card-button,
    .confirm-delete-button {
      min-height: 42px;
      padding: 8px 12px;
      border: 2px solid var(--red-dark);
      border-radius: 9px;
      background: var(--red-soft);
      color: var(--red-dark);
      font-weight: 900;
      cursor: pointer;
    }

    .cancel-delete-button {
      min-height: 42px;
      padding: 8px 12px;
      border: 2px solid var(--black);
      border-radius: 9px;
      background: var(--white);
      color: var(--black);
      font-weight: 900;
      cursor: pointer;
    }

    .delete-card-button:hover,
    .delete-card-button:focus-visible,
    .confirm-delete-button:hover,
    .confirm-delete-button:focus-visible,
    .cancel-delete-button:hover,
    .cancel-delete-button:focus-visible {
      outline: 3px solid var(--yellow);
      outline-offset: 2px;
    }

    .match-toolbar {
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 13px;
    }

    .match-card {
      min-height: 134px;
      padding: 14px;
      border: var(--border);
      border-radius: 13px;
      background: #fffdf3;
      color: var(--black);
      font-weight: 760;
      line-height: 1.25;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      text-align: left;
      box-shadow: var(--shadow-soft);
      transition: transform 120ms ease, box-shadow 120ms ease, background 150ms ease, opacity 200ms ease;
    }

    .match-card-image {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: 76px;
      margin-inline: auto;
      border: 2px solid var(--black);
      border-radius: 8px;
      background: var(--white);
      object-fit: contain;
    }

    .match-card:hover:not(:disabled) {
      transform: translate(-1px, -2px);
      box-shadow: 6px 6px 0 rgba(5, 5, 5, 0.22);
    }

    .match-card.selected {
      background: var(--yellow);
    }

    .match-card.matched {
      border-color: var(--green-dark);
      background: var(--green);
      color: var(--green-dark);
      cursor: default;
    }

    .match-card.wrong {
      border-color: var(--red-dark);
      background: var(--red-soft);
      color: var(--red-dark);
    }

    .mini-badge {
      padding: 3px 7px;
      border: 2px solid currentColor;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.45);
      font-size: 0.57rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .completion {
      position: relative;
      overflow: hidden;
      min-height: 430px;
      padding: 40px 24px;
      border: var(--border);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255, 77, 50, 0.14) 0 5px, transparent 5px),
        repeating-linear-gradient(0deg, transparent 0 34px, rgba(5, 5, 5, 0.06) 34px 35px),
        #fffdf3;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .completion::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 18px;
      width: 76px;
      height: 76px;
      border: 3px solid var(--black);
      border-radius: 18px;
      background-image: url("Logo1.png");
      background-size: 190%;
      background-position: 45% 20%;
      box-shadow: 4px 4px 0 var(--yellow);
      transform: rotate(-4deg);
    }

    .completion > * {
      position: relative;
      z-index: 1;
    }

    .completion-mark {
      width: 92px;
      height: 92px;
      margin-bottom: 20px;
      border: var(--border);
      border-radius: 22px;
      background:
        linear-gradient(135deg, var(--lime), var(--yellow));
      box-shadow: 5px 5px 0 var(--black);
      display: grid;
      place-items: center;
      font-size: 2rem;
      font-weight: 950;
      transform: rotate(-2deg);
    }

    .completion h2 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 7vw, 3.7rem);
      letter-spacing: -0.055em;
    }

    .completion p {
      margin: 0 0 26px;
      color: var(--muted);
      font-weight: 700;
    }

    .completion .btn {
      min-width: 190px;
    }

    .test-shell {
      display: grid;
      gap: 18px;
    }

    .test-intro,
    .test-card,
    .test-results {
      position: relative;
      overflow: hidden;
      border: var(--border);
      border-radius: var(--radius);
      background:
        repeating-linear-gradient(0deg, transparent 0 32px, rgba(5, 5, 5, 0.055) 32px 33px),
        #fffdf3;
      box-shadow: var(--shadow);
    }

    .test-intro,
    .test-results {
      padding: clamp(22px, 4vw, 34px);
    }

    .test-intro {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .test-intro h2,
    .test-results h2 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 6vw, 3.2rem);
      line-height: 1;
      letter-spacing: -0.055em;
    }

    .test-intro p,
    .test-results p {
      margin: 0;
      color: var(--muted);
      font-weight: 760;
      line-height: 1.4;
    }

    .test-card {
      padding: clamp(18px, 4vw, 28px);
    }

    .test-question-header {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .test-question-header strong {
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .test-prompt {
      margin: 0 0 14px;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 850;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .test-options {
      display: grid;
      gap: 10px;
    }

    .test-option {
      min-height: 58px;
      padding: 13px 14px;
      border: var(--border);
      border-radius: 14px;
      background: #fffdf3;
      color: var(--black);
      cursor: pointer;
      display: grid;
      grid-template-columns: 22px 1fr;
      gap: 10px;
      align-items: center;
      font-weight: 760;
      line-height: 1.3;
      text-align: left;
      box-shadow: var(--shadow-soft);
    }

    .test-option input {
      width: 18px;
      height: 18px;
      accent-color: var(--black);
    }

    .test-option:has(input:checked) {
      background: var(--yellow);
    }

    .test-match-row {
      display: grid;
      grid-template-columns: minmax(150px, 0.72fr) minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }

    .test-match-section {
      display: grid;
      gap: 18px;
    }

    .test-match-board {
      display: grid;
      gap: 12px;
    }

    .test-match-term {
      font-weight: 900;
      line-height: 1.25;
    }

    .test-drop-zone {
      min-height: 62px;
      padding: 10px;
      border: var(--border);
      border-radius: 14px;
      background: #fffdf3;
      color: var(--black);
      cursor: pointer;
      display: flex;
      align-items: center;
      line-height: 1.3;
      text-align: left;
    }

    .test-drop-zone.empty {
      border-style: dashed;
      color: var(--muted);
      font-weight: 800;
    }

    .test-drop-zone.drag-over {
      background: var(--yellow);
    }

    .test-answer-bank {
      padding: 14px;
      border: 2px dashed var(--black);
      border-radius: 16px;
      background: rgba(168, 216, 31, 0.12);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
      min-height: 86px;
    }

    .test-answer-bank.drag-over {
      background: var(--yellow);
    }

    .test-answer-chip {
      min-height: 44px;
      padding: 10px 12px;
      border: var(--border);
      border-radius: 14px;
      background: var(--yellow);
      color: var(--black);
      cursor: grab;
      box-shadow: 3px 3px 0 var(--black);
      font-weight: 760;
      line-height: 1.25;
      text-align: left;
      touch-action: none;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }

    .test-answer-chip:hover {
      transform: translateY(-1px);
      box-shadow: 4px 4px 0 var(--black);
    }

    .test-answer-chip.dragging {
      opacity: 0.62;
      cursor: grabbing;
    }

    .test-answer-chip.selected {
      background: var(--yellow);
    }

    .test-drop-zone .test-answer-chip {
      width: 100%;
      box-shadow: none;
      cursor: grab;
    }

    .test-actions,
    .test-result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .test-score {
      margin: 18px 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .test-score .stat {
      border-radius: 14px;
      text-align: center;
    }

    .test-review {
      margin-top: 20px;
      display: grid;
      gap: 12px;
    }

    .test-review-item {
      padding: 14px;
      border: var(--border);
      border-radius: 15px;
      background: #fffdf3;
    }

    .test-review-item.correct {
      border-color: var(--green-dark);
      background: var(--green);
      color: var(--green-dark);
    }

    .test-review-item.wrong {
      border-color: var(--red-dark);
      background: var(--red);
      color: var(--red-dark);
    }

    .test-review-item h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.25;
    }

    .test-review-item p {
      margin: 4px 0 0;
      color: inherit;
      font-size: 0.92rem;
      font-weight: 760;
      line-height: 1.35;
    }

    .test-results::before,
    .stack-end-state::before {
      content: "One page at a time";
      position: absolute;
      top: 16px;
      right: 18px;
      padding: 5px 9px;
      border: 2px solid var(--black);
      border-radius: 4px;
      background: var(--yellow);
      color: var(--black);
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.2);
      font-size: 0.7rem;
      font-weight: 950;
      pointer-events: none;
      transform: rotate(2deg);
    }

    .stack-game {
      display: grid;
      grid-template-columns: minmax(300px, 380px) minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .stack-panel,
    .stack-stage-card {
      border: var(--border);
      border-radius: 18px;
      background:
        repeating-linear-gradient(0deg, transparent 0 30px, rgba(5, 5, 5, 0.05) 30px 31px),
        #fffdf3;
      box-shadow: var(--shadow);
    }

    .stack-panel {
      padding: 20px;
    }

    .stack-stage-card {
      overflow: hidden;
    }

    .stack-stats {
      margin-bottom: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.83rem;
      font-weight: 850;
    }

    .stack-question {
      margin: 0 0 16px;
      font-size: clamp(1.55rem, 3vw, 2.35rem);
      font-weight: 900;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .stack-answer-grid {
      display: grid;
      gap: 10px;
    }

    .stack-answer {
      width: 100%;
      min-height: 68px;
      padding: 13px 14px;
      border: var(--border);
      border-radius: 13px;
      background: #fffdf3;
      color: var(--black);
      font-weight: 780;
      line-height: 1.25;
      text-align: left;
      cursor: pointer;
      transition: transform 120ms ease, background 150ms ease;
    }

    .stack-answer:hover:not(:disabled) {
      transform: translateY(-2px);
    }

    .stack-answer:disabled {
      cursor: default;
    }

    .stack-answer.correct {
      border-color: var(--green-dark);
      background: var(--green);
      color: var(--green-dark);
    }

    .stack-answer.wrong {
      border-color: var(--red-dark);
      background: var(--red-soft);
      color: var(--red-dark);
    }

    .stack-feedback {
      min-height: 45px;
      margin: 14px 0 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.35;
    }

    .stack-feedback strong {
      color: var(--black);
    }

    .stack-preview {
      margin-top: 16px;
      padding: 14px;
      border: 2px dashed var(--black);
      border-radius: 15px;
      background: rgba(255, 212, 59, 0.14);
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 12px;
      align-items: center;
    }

    .stack-preview.empty {
      color: var(--muted);
      display: block;
      font-weight: 800;
    }

    .stack-preview-shape {
      width: 52px;
      height: 38px;
      border: 2px solid var(--black);
      background: var(--yellow);
    }

    .stack-preview h3 {
      margin: 0 0 2px;
      font-size: 1rem;
      line-height: 1.1;
    }

    .stack-preview p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
      line-height: 1.3;
    }

    .stack-controls {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .stack-stage-toolbar {
      padding: 13px 16px;
      border-bottom: var(--border);
      background: var(--yellow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.86rem;
      font-weight: 850;
    }

    .stack-stage {
      position: relative;
      height: min(58vh, 560px);
      min-height: 430px;
      overflow: hidden;
      background:
        linear-gradient(rgba(5, 5, 5, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(5, 5, 5, 0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 77, 50, 0.14) 0 4px, transparent 4px),
        #fffdf3;
      background-size: 34px 34px, 34px 34px, 100% 100%, auto;
      touch-action: none;
    }

    .stack-stage canvas {
      position: absolute !important;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      z-index: 1;
    }

    .stack-drop-hint {
      position: absolute;
      left: 50%;
      bottom: 30px;
      z-index: 2;
      width: min(42%, 320px);
      height: 22px;
      transform: translateX(-50%);
      border: 2px solid var(--black);
      border-radius: 999px;
      background: var(--black);
      box-shadow: 0 6px 0 rgba(5, 5, 5, 0.12);
      pointer-events: none;
    }

    .stack-token-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
    }

    .stack-token {
      position: absolute;
      border: 2px solid var(--black);
      border-radius: 8px;
      box-shadow: 4px 4px 0 rgba(5, 5, 5, 0.28);
      cursor: grab;
      pointer-events: auto;
      touch-action: none;
    }

    .stack-token:focus-visible {
      outline: 4px solid var(--yellow);
      outline-offset: 4px;
    }

    .stack-token.dragging {
      cursor: grabbing;
      box-shadow: 6px 6px 0 rgba(5, 5, 5, 0.28);
    }

    .stack-token.circle {
      border-radius: 50%;
    }

    .stack-overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      padding: 24px;
      background: rgba(244, 244, 240, 0.88);
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .stack-overlay.active {
      display: flex;
    }

    .stack-end-state {
      position: relative;
      overflow: hidden;
      width: min(100%, 440px);
      padding: 28px;
      border: var(--border);
      border-radius: 18px;
      background: var(--white);
      box-shadow: var(--shadow);
    }

    .stack-end-state h2 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .stack-end-state p {
      margin: 0 0 20px;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.35;
    }

    .stack-end-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .theme-toggle {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 6px 8px 6px 14px;
      border: 2px solid rgba(255, 255, 255, 0.82);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-size: 0.76rem;
      font-weight: 950;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 3px 3px 0 rgba(5, 5, 5, 0.45);
      transition: transform 120ms ease, box-shadow 120ms ease, background 160ms ease, color 160ms ease;
    }

    .theme-toggle:hover,
    .theme-toggle:focus-visible {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 rgba(5, 5, 5, 0.58);
      outline: none;
    }

    .theme-toggle-track {
      position: relative;
      width: 42px;
      height: 24px;
      border: 2px solid currentColor;
      border-radius: 999px;
      background: var(--yellow);
    }

    .theme-toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: currentColor;
      transition: transform 160ms ease;
    }

    body.plain-theme {
      --black: #000000;
      --white: #ffffff;
      --paper: #ffffff;
      --paper-deep: #ffffff;
      --paper-line: #e4e4e4;
      --muted: #4a4a4a;
      --yellow: #ffffff;
      --note-pink: #ffffff;
      --note-blue: #ffffff;
      --lime: #ffffff;
      --green: #ffffff;
      --green-dark: #000000;
      --red: #ffffff;
      --red-soft: #ffffff;
      --red-dark: #000000;
      --purple: #000000;
      --wood: #000000;
      --ink-soft: #000000;
      --border: 2px solid #000000;
      --radius: 6px;
      --shadow: none;
      --shadow-soft: none;
      background: #ffffff;
      color: #000000;
    }

    body.plain-theme::before,
    body.plain-theme .app-header::before,
    body.plain-theme .study-card::before,
    body.plain-theme .study-card::after,
    body.plain-theme .completion::before,
    body.plain-theme .test-results::before,
    body.plain-theme .stack-end-state::before {
      display: none;
    }

    body.plain-theme .app-header {
      overflow: visible;
      background: #ffffff;
      color: #000000;
      border-bottom: 2px solid #000000;
    }

    body.plain-theme .brand,
    body.plain-theme .card-copy,
    body.plain-theme .definition-copy,
    body.plain-theme .completion h2,
    body.plain-theme .test-intro h2,
    body.plain-theme .test-results h2,
    body.plain-theme .stack-question,
    body.plain-theme .stack-end-state h2 {
      letter-spacing: 0;
      text-shadow: none;
    }

    body.plain-theme .logo-mark,
    body.plain-theme .brand-tagline,
    body.plain-theme .deck-label,
    body.plain-theme .theme-toggle,
    body.plain-theme .tab,
    body.plain-theme .progress-track,
    body.plain-theme .deck-message,
    body.plain-theme .stat,
    body.plain-theme .study-card,
    body.plain-theme .badge,
    body.plain-theme .btn,
    body.plain-theme .answer,
    body.plain-theme .match-card,
    body.plain-theme .view-card-row,
    body.plain-theme .card-editor,
    body.plain-theme .card-editor-field input,
    body.plain-theme .card-editor-field textarea,
    body.plain-theme .card-image-picker input[type="file"],
    body.plain-theme .card-image-preview,
    body.plain-theme .delete-card-button,
    body.plain-theme .confirm-delete-button,
    body.plain-theme .cancel-delete-button,
    body.plain-theme .view-card-term,
    body.plain-theme .completion,
    body.plain-theme .completion-mark,
    body.plain-theme .test-intro,
    body.plain-theme .test-card,
    body.plain-theme .test-results,
    body.plain-theme .test-option,
    body.plain-theme .test-drop-zone,
    body.plain-theme .test-answer-bank,
    body.plain-theme .test-answer-chip,
    body.plain-theme .test-review-item,
    body.plain-theme .stack-panel,
    body.plain-theme .stack-stage-card,
    body.plain-theme .stack-answer,
    body.plain-theme .stack-preview,
    body.plain-theme .stack-preview-shape,
    body.plain-theme .stack-stage-toolbar,
    body.plain-theme .stack-end-state {
      border-color: #000000;
      border-radius: 6px;
      background: #ffffff;
      color: #000000;
      box-shadow: none;
      transform: none;
    }

    body.plain-theme .logo-mark img,
    body.plain-theme .completion::before {
      filter: grayscale(1) contrast(1.35);
    }

    body.plain-theme .tab.active,
    body.plain-theme .btn-dark,
    body.plain-theme .progress-fill,
    body.plain-theme .stack-drop-hint {
      background: #000000;
      color: #ffffff;
    }

    body.plain-theme .theme-toggle {
      border-color: #000000;
      color: #000000;
    }

    body.plain-theme .theme-toggle-track {
      background: #000000;
    }

    body.plain-theme .theme-toggle-thumb {
      background: #ffffff;
      transform: translateX(18px);
    }

    body.plain-theme .study-card,
    body.plain-theme .answer,
    body.plain-theme .view-card-row,
    body.plain-theme .completion,
    body.plain-theme .test-intro,
    body.plain-theme .test-card,
    body.plain-theme .test-results,
    body.plain-theme .stack-panel,
    body.plain-theme .stack-stage-card,
    body.plain-theme .stack-stage {
      background-image: none;
    }

    body.plain-theme .answer.correct,
    body.plain-theme .match-card.matched,
    body.plain-theme .test-review-item.correct,
    body.plain-theme .stack-answer.correct {
      border-style: double;
    }

    body.plain-theme .answer.wrong,
    body.plain-theme .match-card.wrong,
    body.plain-theme .test-review-item.wrong,
    body.plain-theme .stack-answer.wrong {
      border-style: dashed;
    }

    /*
      Keep the controls for the fixed study modes inside a typical laptop
      viewport. Long-form modes (the term list and tests) intentionally retain
      their natural document scrolling.
    */
    @media (min-width: 701px) and (max-height: 900px) {
      .app-header {
        padding-block: 10px;
      }

      .logo-mark {
        flex-basis: 54px;
        width: 54px;
        height: 54px;
        border-radius: 14px;
      }

      .brand-copy {
        gap: 3px;
      }

      .brand {
        font-size: 1.7rem;
      }

      .shell {
        margin-top: 14px;
        margin-bottom: 28px;
      }

      .tabs {
        margin-bottom: 14px;
      }

      .tab {
        padding-block: 8px 10px;
      }

      .status-row {
        margin-bottom: 9px;
      }

      #flashcardsPanel .study-card {
        min-height: clamp(260px, calc(100dvh - 330px), 360px);
        padding-block: 26px;
      }

      #flashcardsPanel .card-image {
        max-height: 110px;
        margin-bottom: 10px;
      }

    @media (max-width: 700px) {
