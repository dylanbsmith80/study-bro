  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand-lockup" aria-label="Study Bro">
      <span class="logo-mark" aria-hidden="true">
        <span>SB</span>
        <img src="Logo1.png" alt="">
      </span>
      <div class="brand-copy">
        <h1 class="brand">Study Bro.</h1>
        <span class="brand-tagline">One page at a time</span>
      </div>
    </div>
    <div class="header-actions">
      <span class="deck-label">
        <span class="deck-title" id="deckTitle">Sample deck</span> · <span id="deckCount"></span> terms
      </span>
      <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false" aria-label="Switch to basic black and white theme">
        <span id="themeToggleLabel">Basic</span>
        <span class="theme-toggle-track" aria-hidden="true"><span class="theme-toggle-thumb"></span></span>
      </button>
    </div>
  </header>

  <main class="shell">
    <nav class="tabs" aria-label="Study modes">
      <button class="tab" type="button" data-mode="viewCards">View Cards</button>
      <button class="tab active" type="button" data-mode="flashcards">Flashcards</button>
      <button class="tab" type="button" data-mode="learn">Learn</button>
      <button class="tab" type="button" data-mode="match">Match</button>
      <button class="tab" type="button" data-mode="stack">Stack</button>
      <button class="tab" type="button" data-mode="test">Test</button>
    </nav>

    <div class="progress-track" aria-label="Study progress">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="deck-message" id="deckMessage" role="alert" hidden></div>

    <section class="mode-panel active" id="flashcardsPanel" aria-label="Flashcards mode"></section>
    <section class="mode-panel" id="learnPanel" aria-label="Learn mode"></section>
    <section class="mode-panel" id="matchPanel" aria-label="Match mode"></section>
    <section class="mode-panel" id="testPanel" aria-label="Test mode"></section>
    <section class="mode-panel" id="viewCardsPanel" aria-label="View all cards"></section>
    <section class="mode-panel" id="stackPanel" aria-label="Stack game mode"></section>
  </main>

  <div class="image-viewer" id="imageViewer" role="dialog" aria-modal="true" aria-label="Enlarged card image" hidden>
    <div class="image-viewer-dialog">
      <button class="image-viewer-close" id="closeImageViewer" type="button">Close ✕</button>
      <img class="image-viewer-image" id="imageViewerImage" alt="">
      <p class="image-viewer-caption" id="imageViewerCaption"></p>
    </div>
  </div>

  <script>
    const sampleDeck = {
      title: "Sample deck",
      cards: [
        { term: "Photosynthesis", definition: "The process plants use to convert light energy into chemical energy." },
        { term: "Mitosis", definition: "Cell division that produces two genetically identical daughter cells." },
        { term: "Ecosystem", definition: "A community of organisms interacting with each other and their environment." },
        { term: "Velocity", definition: "The speed of an object in a specific direction." },
        { term: "Atom", definition: "The smallest unit of an element that retains its chemical properties." },
        { term: "Democracy", definition: "A system of government in which power is held by the people." },
        { term: "Metaphor", definition: "A figure of speech that directly compares two unlike things." },
        { term: "Hypothesis", definition: "A testable explanation or prediction based on available evidence." },
        { term: "Inflation", definition: "A general increase in prices and fall in the purchasing value of money." },
        { term: "Algorithm", definition: "A step-by-step procedure for solving a problem or completing a task." }
      ]
    };

    const DECK_EDITS_STORAGE_PREFIX = "studyBroDeckEdits:v1:";
    let deckTitle = sampleDeck.title;
    let deck = sampleDeck.cards;
    let hasLocalDeckEdits = false;
    let isAddCardFormOpen = false;
    let pendingDeleteCardIndex = null;
    let pendingCardImageData = "";
    let isCardImageProcessing = false;
    let imageViewerTrigger = null;

    const elements = {
      progress: document.querySelector("#progressFill"),
      deckTitle: document.querySelector("#deckTitle"),
      deckCount: document.querySelector("#deckCount"),
      deckMessage: document.querySelector("#deckMessage"),
      themeToggle: document.querySelector("#themeToggle"),
      themeToggleLabel: document.querySelector("#themeToggleLabel"),
      flashcards: document.querySelector("#flashcardsPanel"),
      learn: document.querySelector("#learnPanel"),
      match: document.querySelector("#matchPanel"),
      test: document.querySelector("#testPanel"),
      viewCards: document.querySelector("#viewCardsPanel"),
      stack: document.querySelector("#stackPanel"),
      shell: document.querySelector(".shell"),
      tabs: [...document.querySelectorAll(".tab")]
    };

    let activeMode = "flashcards";
    let timerInterval = null;
    let learnAdvanceTimer = null;
    let stackGame = null;

    const flashState = {};
    const learnState = {};
    const matchState = {};
    const testState = {};

    function getSavedThemePreference() {
      try {
        return localStorage.getItem("studyBroPlainTheme") === "true";
      } catch (error) {
        return false;
      }
    }

    function saveThemePreference(usePlainTheme) {
      try {
        localStorage.setItem("studyBroPlainTheme", usePlainTheme ? "true" : "false");
      } catch (error) {
        // Some file:// browser settings block storage; the toggle should still work for this page view.
      }
    }

    function setThemePreference(usePlainTheme, shouldSave = true) {
      document.body.classList.toggle("plain-theme", usePlainTheme);
      elements.themeToggle.setAttribute("aria-pressed", String(usePlainTheme));
      elements.themeToggle.setAttribute(
        "aria-label",
        usePlainTheme ? "Switch to fun Study Bro theme" : "Switch to basic black and white theme"
      );
      elements.themeToggleLabel.textContent = usePlainTheme ? "Fun" : "Basic";
      if (shouldSave) saveThemePreference(usePlainTheme);
    }

    function initThemeToggle() {
      setThemePreference(getSavedThemePreference(), false);
      elements.themeToggle.addEventListener("click", () => {
        setThemePreference(!document.body.classList.contains("plain-theme"));
      });
    }

    function shuffle(items) {
      const copy = [...items];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isSafePublishedImagePath(value) {
      if (typeof value !== "string") return false;
      return /^deck-assets\/[a-z0-9](?:[a-z0-9-]{0,78}[a-z0-9])?\/[a-z0-9][a-z0-9._-]*\.(?:gif|jpe?g|png|webp)$/i.test(value.trim());
    }

    function cardImageHTML(card, className = "card-image", showHint = true) {
      if (!card?.image || typeof card.image !== "string") return "";
      const cardLabel = card.term || card.text || "card";
      const imageAlt = typeof card.imageAlt === "string" && card.imageAlt.trim()
        ? card.imageAlt.trim()
        : `Image for ${cardLabel}`;
      return (
        `<img class="${className}" src="${escapeHTML(card.image)}" ` +
          `alt="${escapeHTML(imageAlt)}" ` +
          `aria-label="Enlarge image: ${escapeHTML(imageAlt)}" ` +
          `title="Enlarge image" role="button" tabindex="0" data-enlarge-card-image>` +
        (showHint ? '<span class="image-enlarge-hint">Tap or click the image to enlarge</span>' : '')
      );
    }

    function openImageViewer(image) {
      const viewer = document.querySelector("#imageViewer");
      const viewerImage = document.querySelector("#imageViewerImage");
      const caption = document.querySelector("#imageViewerCaption");
      if (!viewer || !viewerImage || !image?.src) return;

      imageViewerTrigger = image;
      viewerImage.src = image.src;
      viewerImage.alt = image.alt || "Enlarged card image";
      caption.textContent = image.alt || "";
      viewer.hidden = false;
      document.body.classList.add("image-viewer-open");
      document.querySelector("#closeImageViewer")?.focus();
    }

    function closeImageViewer() {
      const viewer = document.querySelector("#imageViewer");
      const viewerImage = document.querySelector("#imageViewerImage");
      if (!viewer || viewer.hidden) return;

      viewer.hidden = true;
      document.body.classList.remove("image-viewer-open");
      viewerImage.removeAttribute("src");
      imageViewerTrigger?.focus();
      imageViewerTrigger = null;
    }

    function initImageViewer() {
      document.addEventListener("click", (event) => {
        const image = event.target.closest?.("[data-enlarge-card-image]");
        if (!image) return;
        event.preventDefault();
        event.stopPropagation();
        openImageViewer(image);
      }, true);

      document.addEventListener("keydown", (event) => {
        const image = event.target.closest?.("[data-enlarge-card-image]");
        if (image && (event.key === "Enter" || event.key === " ")) {
          event.preventDefault();
          event.stopPropagation();
          openImageViewer(image);
          return;
        }

        if (event.key === "Escape" && !document.querySelector("#imageViewer")?.hidden) {
          event.preventDefault();
          closeImageViewer();
        }
      }, true);

      document.addEventListener("error", (event) => {
        const image = event.target.closest?.("[data-enlarge-card-image]");
        if (!image) return;
        image.hidden = true;
        if (image.nextElementSibling?.classList.contains("image-enlarge-hint")) {
          image.nextElementSibling.hidden = true;
        }
        console.warn(`Study Bro could not load card image: ${image.getAttribute("src")}`);
      }, true);

      document.querySelector("#closeImageViewer")?.addEventListener("click", closeImageViewer);
      document.querySelector("#imageViewer")?.addEventListener("click", (event) => {
        if (event.target.id === "imageViewer") closeImageViewer();
      });
    }

    function setProgress(percent) {
      elements.progress.style.width = `${Math.max(0, Math.min(100, percent))}%`;
    }

    function validateDeck(data) {
      if (!data || typeof data.title !== "string" || !data.title.trim()) {
        throw new Error("The deck needs a non-empty title.");
      }

      if (!Array.isArray(data.cards) || data.cards.length === 0) {
        throw new Error("The deck needs at least one card.");
      }

      const validCards = data.cards.every((card) => {
        if (
          !card ||
          typeof card.term !== "string" ||
          !card.term.trim() ||
          typeof card.definition !== "string" ||
          !card.definition.trim()
        ) {
          return false;
        }

        const image = card.image;
        const imageAlt = card.imageAlt;
        if (image === undefined || image === "") {
          return imageAlt === undefined || imageAlt === "";
        }
        if (typeof image !== "string" || !image.trim()) return false;

        if (image.trim().startsWith("data:image/")) {
          return (
            imageAlt === undefined ||
            imageAlt === "" ||
            (typeof imageAlt === "string" && Boolean(imageAlt.trim()))
          );
        }

        return (
          isSafePublishedImagePath(image) &&
          typeof imageAlt === "string" &&
          Boolean(imageAlt.trim())
        );
      });

      if (!validCards) {
        throw new Error(
          "Every card needs a non-empty term and definition. Published images also need a safe deck-assets path and non-empty alt text."
        );
      }
    }

    function normalizeDeck(data) {
      return {
        title: data.title.trim(),
        cards: data.cards.map((card) => {
          const term = card.term.trim();
          return {
            term,
            definition: card.definition.trim(),
            ...(card.image ? {
              image: card.image.trim(),
              imageAlt: typeof card.imageAlt === "string" && card.imageAlt.trim()
                ? card.imageAlt.trim()
                : `Image for ${term}`
            } : {})
          };
        })
      };
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.addEventListener("load", () => resolve(reader.result));
        reader.addEventListener("error", () => reject(new Error("The image could not be read.")));
        reader.readAsDataURL(file);
      });
    }

    function loadImage(dataURL) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        image.addEventListener("load", () => resolve(image));
        image.addEventListener("error", () => reject(new Error("That file is not a supported image.")));
        image.src = dataURL;
      });
    }

    function renderCompressedImage(image, maxDimension, quality) {
      const scale = Math.min(1, maxDimension / Math.max(image.naturalWidth, image.naturalHeight));
      const width = Math.max(1, Math.round(image.naturalWidth * scale));
      const height = Math.max(1, Math.round(image.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(image, 0, 0, width, height);
      return canvas.toDataURL("image/webp", quality);
    }

    async function compressCardImage(file) {
      if (!file.type.startsWith("image/")) {
        throw new Error("Please choose an image file.");
      }
      if (file.size > 10 * 1024 * 1024) {
        throw new Error("Please choose an image smaller than 10 MB.");
      }

      const sourceData = await readFileAsDataURL(file);
      const image = await loadImage(sourceData);
      let compressed = renderCompressedImage(image, 900, 0.8);
      if (compressed.length > 240000) {
        compressed = renderCompressedImage(image, 600, 0.66);
      }
      if (compressed.length > 180000) {
        compressed = renderCompressedImage(image, 480, 0.58);
      }
      return compressed;
    }

    function updateCardImagePreview(message = "") {
      const preview = document.querySelector("#newCardImagePreview");
      const saveButton = document.querySelector("#saveNewCardButton");
      if (!preview) return;

      preview.setAttribute("aria-busy", String(isCardImageProcessing));
      saveButton?.toggleAttribute("disabled", isCardImageProcessing);
      if (pendingCardImageData) {
        preview.innerHTML =
          `<img src="${escapeHTML(pendingCardImageData)}" alt="Selected card image preview">` +
          `<span>${escapeHTML(message || "Image ready and compressed for local saving.")}</span>`;
      } else {
        preview.textContent = message || "Optional · JPG, PNG, GIF, or WebP up to 10 MB";
      }
    }

    function getDeckStorageKey() {
      const deckURL = new URL(window.location.href);
      deckURL.hash = "";
      return `${DECK_EDITS_STORAGE_PREFIX}${deckURL.href}`;
    }

    function getSavedDeck() {
      try {
        const savedValue = localStorage.getItem(getDeckStorageKey());
        if (!savedValue) return null;

        const savedDeck = JSON.parse(savedValue);
        validateDeck(savedDeck);
        hasLocalDeckEdits = true;
        return normalizeDeck(savedDeck);
      } catch (error) {
        showDeckError(`Your locally saved card changes could not be loaded. ${error.message}`);
        return null;
      }
    }

    function saveEditedDeck(cards) {
      const editedDeck = {
        title: deckTitle,
        cards
      };

      try {
        validateDeck(editedDeck);
        localStorage.setItem(getDeckStorageKey(), JSON.stringify(editedDeck));
        hasLocalDeckEdits = true;
        return true;
      } catch (error) {
        showDeckError(`Your card changes could not be saved on this device. ${error.message}`);
        return false;
      }
    }

    function reopenCardManager() {
      const cardManagerURL = new URL(window.location.href);
      cardManagerURL.hash = "viewCards";
      window.history.replaceState(null, "", cardManagerURL.href);
      window.location.reload();
    }

    function updateDeckHeader() {
      elements.deckTitle.textContent = deckTitle;
      elements.deckCount.textContent = deck.length;
      document.title = `${deckTitle} · Study Bro`;
      window.studyBroDeck = deck;
    }

    function showDeckError(message) {
      elements.deckMessage.textContent = message;
      elements.deckMessage.hidden = false;
    }

    async function loadDeck() {
      const savedDeck = getSavedDeck();
      if (savedDeck) {
        deckTitle = savedDeck.title;
        deck = savedDeck.cards;
        updateDeckHeader();
        return;
      }

      const deckPath = new URLSearchParams(window.location.search).get("deck");
      if (!deckPath) {
        updateDeckHeader();
        return;
      }

      try {
        const response = await fetch(deckPath);
        if (!response.ok) {
          throw new Error(`Request failed with status ${response.status}.`);
        }

        const data = await response.json();
        validateDeck(data);
        const normalizedDeck = normalizeDeck(data);
        deckTitle = normalizedDeck.title;
        deck = normalizedDeck.cards;
      } catch (error) {
        deckTitle = sampleDeck.title;
        deck = sampleDeck.cards;
        showDeckError(`Could not load "${deckPath}". ${error.message} Showing the sample deck instead.`);
      }

      updateDeckHeader();
    }

    function startApp() {
      initFlashcards();
      initLearn();
      initMatch();
      switchMode(window.location.hash === "#viewCards" ? "viewCards" : "flashcards");
    }

    function initFlashcards() {
      Object.assign(flashState, {
        queue: deck.map((_, index) => index),
        missed: [],
        index: 0,
        round: 1,
        known: 0,
        unknown: 0,
        flipped: false,
        flipStage: null,
        complete: false
      });
      renderFlashcards();
    }

    function renderFlashcards() {
      if (flashState.complete) {
        elements.flashcards.innerHTML = completionHTML(
          "Deck complete",
          `${flashState.known} got it · ${flashState.unknown} still learning`,
          "Study again",
          "initFlashcards()"
        );
        setProgress(100);
        return;
      }

      const card = deck[flashState.queue[flashState.index]];
      const showingDefinition = flashState.flipped;
      const completed = flashState.index;
      const total = flashState.queue.length;
      setProgress((completed / total) * 100);

      elements.flashcards.innerHTML = `
        <div class="status-row">
          <div class="status-group">
            <span class="stat">Round ${flashState.round}</span>
            <span class="stat">Known ${flashState.known}</span>
            <span class="stat">Learning ${flashState.unknown}</span>
          </div>
          <span>${flashState.index + 1} / ${total}</span>
        </div>
        <article class="study-card flashcard ${flashState.flipStage ? `flipping-${flashState.flipStage}` : ""}" id="activeFlashcard" role="button" tabindex="0" aria-label="Flip card">
          <span class="badge">${showingDefinition ? "definition" : "term"}</span>
          ${showingDefinition ? cardImageHTML(card) : ""}
          <p class="card-copy ${showingDefinition ? "definition-copy" : ""}">
            ${escapeHTML(showingDefinition ? card.definition : card.term)}
          </p>
          <span class="flip-note">click to flip ↻</span>
        </article>
        <div class="actions">
          <button class="btn" type="button" id="missedButton">Still learning ✗</button>
          <button class="btn btn-dark" type="button" id="knownButton">Got it ✓</button>
        </div>
      `;

      const flashcard = document.querySelector("#activeFlashcard");
      flashcard.addEventListener("click", flipFlashcard);
      flashcard.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          flipFlashcard();
        }
      });
      document.querySelector("#missedButton").addEventListener("click", () => gradeFlashcard(false));
      document.querySelector("#knownButton").addEventListener("click", () => gradeFlashcard(true));
    }

    function flipFlashcard() {
      if (flashState.flipStage) return;

      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (reduceMotion) {
        flashState.flipped = !flashState.flipped;
        renderFlashcards();
        return;
      }

      flashState.flipStage = "out";
      renderFlashcards();

      window.setTimeout(() => {
        flashState.flipped = !flashState.flipped;
        flashState.flipStage = "in";
        renderFlashcards();

        window.setTimeout(() => {
          flashState.flipStage = null;
          renderFlashcards();
        }, 170);
      }, 150);
    }

    function shouldIgnoreFlashcardShortcut(event) {
      const target = event.target;
      if (!target) return false;
      const tagName = target.tagName;
      return target.isContentEditable || ["INPUT", "TEXTAREA", "SELECT", "BUTTON"].includes(tagName);
    }

    function handleFlashcardShortcut(event) {
      if (activeMode !== "flashcards" || flashState.complete || shouldIgnoreFlashcardShortcut(event)) return;

      if (event.key === " " || event.code === "Space") {
        event.preventDefault();
        flipFlashcard();
      } else if (event.key === "ArrowRight") {
        event.preventDefault();
        gradeFlashcard(true);
      } else if (event.key === "ArrowLeft") {
        event.preventDefault();
        gradeFlashcard(false);
      }
    }

    function gradeFlashcard(isKnown) {
      const cardIndex = flashState.queue[flashState.index];
      if (isKnown) {
        flashState.known += 1;
      } else {
        flashState.unknown += 1;
        if (flashState.round === 1) flashState.missed.push(cardIndex);
      }

      flashState.index += 1;
      flashState.flipped = false;
      flashState.flipStage = null;

      if (flashState.index >= flashState.queue.length) {
        if (flashState.round === 1 && flashState.missed.length) {
          flashState.queue = shuffle(flashState.missed);
          flashState.index = 0;
          flashState.round = 2;
        } else {
          flashState.complete = true;
        }
      }
      renderFlashcards();
    }

    function renderViewCards() {
      setProgress(100);
      const rows = deck.map((card, index) => {
        const deleteControls = pendingDeleteCardIndex === index
          ? '<button class="confirm-delete-button" type="button" data-confirm-delete="' + index + '">' +
              'Confirm delete</button>' +
            '<button class="cancel-delete-button" type="button" data-cancel-delete>Cancel</button>'
          : '<button class="delete-card-button" type="button" data-delete-card="' + index + '" ' +
              'aria-label="Delete ' + escapeHTML(card.term) + '">Delete</button>';

        return '<article class="view-card-row">' +
          '<div class="view-card-term">' + (index + 1) + '. ' + escapeHTML(card.term) + '</div>' +
          '<div class="view-card-definition">' + escapeHTML(card.definition) +
            cardImageHTML(card, "view-card-image") + '</div>' +
          '<div class="view-card-actions">' +
            deleteControls +
          '</div>' +
        '</article>';
      }).join("");

      const editor = isAddCardFormOpen
        ? '<form class="card-editor" id="addCardForm">' +
            '<h2>Add a card</h2>' +
            '<div class="card-editor-fields">' +
              '<label class="card-editor-field">Term' +
                '<input id="newCardTerm" name="term" type="text" maxlength="300" required autocomplete="off">' +
              '</label>' +
              '<label class="card-editor-field">Definition' +
                '<textarea id="newCardDefinition" name="definition" maxlength="2000" required></textarea>' +
              '</label>' +
              '<div class="card-image-picker">' +
                '<label class="card-editor-field">Optional image' +
                  '<input id="newCardImage" name="image" type="file" accept="image/*">' +
                '</label>' +
                '<div class="card-image-preview" id="newCardImagePreview" aria-live="polite">' +
                  'Optional · JPG, PNG, GIF, or WebP up to 10 MB' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="card-editor-actions">' +
              '<button class="btn" type="button" id="cancelAddCard">Cancel</button>' +
              '<button class="btn btn-dark" type="submit" id="saveNewCardButton">Save card</button>' +
            '</div>' +
          '</form>'
        : '';

      elements.viewCards.innerHTML =
        '<div class="view-cards-toolbar">' +
          '<div class="status-group">' +
            '<span class="stat">' + deck.length + ' cards</span>' +
            (hasLocalDeckEdits ? '<span class="local-save-status">Saved on this device</span>' : '') +
          '</div>' +
          '<button class="btn btn-yellow" type="button" id="openAddCard">Add card</button>' +
        '</div>' +
        editor +
        '<div class="view-cards-list">' + rows + '</div>';

      document.querySelector("#openAddCard").addEventListener("click", () => {
        isAddCardFormOpen = true;
        pendingCardImageData = "";
        isCardImageProcessing = false;
        renderViewCards();
        document.querySelector("#newCardTerm")?.focus();
      });

      document.querySelector("#cancelAddCard")?.addEventListener("click", () => {
        isAddCardFormOpen = false;
        pendingCardImageData = "";
        isCardImageProcessing = false;
        renderViewCards();
      });

      document.querySelector("#newCardImage")?.addEventListener("change", async (event) => {
        const file = event.target.files?.[0];
        pendingCardImageData = "";
        if (!file) {
          updateCardImagePreview();
          return;
        }

        isCardImageProcessing = true;
        updateCardImagePreview("Compressing image…");
        try {
          pendingCardImageData = await compressCardImage(file);
          isCardImageProcessing = false;
          updateCardImagePreview();
        } catch (error) {
          pendingCardImageData = "";
          isCardImageProcessing = false;
          event.target.value = "";
          updateCardImagePreview(error.message);
        }
      });

      document.querySelector("#addCardForm")?.addEventListener("submit", (event) => {
        event.preventDefault();
        if (isCardImageProcessing) return;
        const term = document.querySelector("#newCardTerm").value.trim();
        const definition = document.querySelector("#newCardDefinition").value.trim();
        if (!term || !definition) return;

        const newCard = {
          term,
          definition,
          ...(pendingCardImageData ? {
            image: pendingCardImageData,
            imageAlt: `Image for ${term}`
          } : {})
        };
        const updatedCards = [...deck, newCard];
        if (saveEditedDeck(updatedCards)) reopenCardManager();
      });

      document.querySelectorAll("[data-delete-card]").forEach((button) => {
        button.addEventListener("click", () => {
          const cardIndex = Number(button.dataset.deleteCard);
          const card = deck[cardIndex];
          if (!card) return;

          if (deck.length === 1) {
            showDeckError("A deck must keep at least one card.");
            return;
          }

          pendingDeleteCardIndex = cardIndex;
          renderViewCards();
          document.querySelector(`[data-confirm-delete="${cardIndex}"]`)?.focus();
        });
      });

      document.querySelector("[data-cancel-delete]")?.addEventListener("click", () => {
        pendingDeleteCardIndex = null;
        renderViewCards();
      });

      document.querySelectorAll("[data-confirm-delete]").forEach((button) => {
        button.addEventListener("click", () => {
          const cardIndex = Number(button.dataset.confirmDelete);
          const updatedCards = deck.filter((_, index) => index !== cardIndex);
          if (saveEditedDeck(updatedCards)) reopenCardManager();
        });
      });
    }
    function clearLearnAdvanceTimer() {
      if (learnAdvanceTimer) window.clearTimeout(learnAdvanceTimer);
      learnAdvanceTimer = null;
    }

    function initLearn() {
      clearLearnAdvanceTimer();
      Object.assign(learnState, {
        queue: shuffle(deck.map((_, index) => index)),
        missed: [],
        index: 0,
        round: 1,
        correct: 0,
        answered: 0,
        locked: false,
        complete: false,
        selectedChoice: null,
        correctChoice: null,
        needsNext: false,
        feedback: "",
        choices: []
      });
      prepareLearnQuestion();
    }

    function prepareLearnQuestion() {
      clearLearnAdvanceTimer();
      if (learnState.complete) {
        renderLearn();
        return;
      }
      const currentIndex = learnState.queue[learnState.index];
      const distractors = shuffle(
        deck.map((card, index) => ({ definition: card.definition, index }))
          .filter((item) => item.index !== currentIndex)
      ).slice(0, Math.min(3, deck.length - 1));

      learnState.choices = shuffle([
        { definition: deck[currentIndex].definition, index: currentIndex },
        ...distractors
      ]);
      learnState.locked = false;
      learnState.selectedChoice = null;
      learnState.correctChoice = null;
      learnState.needsNext = false;
      learnState.feedback = "";
      renderLearn();
    }

    function renderLearn() {
      if (learnState.complete) {
        const percentage = learnState.answered
          ? Math.round((learnState.correct / learnState.answered) * 100)
          : 0;
        elements.learn.innerHTML = completionHTML(
          `${percentage}% score`,
          `${learnState.correct} correct out of ${learnState.answered} answers`,
          "Try again",
          "initLearn()"
        );
        setProgress(100);
        return;
      }

      const currentIndex = learnState.queue[learnState.index];
      const card = deck[currentIndex];
      setProgress((learnState.index / learnState.queue.length) * 100);
      const answersLocked = learnState.locked;

      elements.learn.innerHTML = `
        <div class="status-row">
          <div class="status-group">
            <span class="stat">Round ${learnState.round}</span>
            <span class="stat">Score ${learnState.correct} / ${learnState.answered}</span>
          </div>
          <span>${learnState.index + 1} / ${learnState.queue.length}</span>
        </div>
        <article class="study-card learn-prompt">
          <span class="badge">term</span>
          <p class="card-copy">${escapeHTML(card.term)}</p>
        </article>
        <div class="answers" id="answerGrid">
          ${learnState.choices.map((choice, index) => {
            const classes = ["answer"];
            if (learnState.correctChoice === index) classes.push("correct");
            if (learnState.selectedChoice === index && learnState.correctChoice !== index) classes.push("wrong");

            return `
            <button class="${classes.join(" ")}" type="button" data-choice="${index}" ${answersLocked ? "disabled" : ""}>
              <span class="mini-badge">definition</span><br><br>
              ${escapeHTML(choice.definition)}
            </button>
          `;
          }).join("")}
        </div>
        <p class="learn-feedback" id="learnFeedback">
          ${learnState.feedback}
        </p>
        <div class="learn-controls">
          <button class="btn" type="button" id="dontKnowButton" ${answersLocked ? "disabled" : ""}>I don't know</button>
          <button class="btn btn-dark" type="button" id="learnNextButton" ${learnState.needsNext ? "" : "hidden"}>Next</button>
        </div>
      `;

      document.querySelectorAll(".answer").forEach((button) => {
        button.addEventListener("click", () => answerLearn(Number(button.dataset.choice)));
      });
      document.querySelector("#dontKnowButton").addEventListener("click", () => answerLearn(null));
      document.querySelector("#learnNextButton")?.addEventListener("click", advanceLearnQuestion);
    }

    function answerLearn(choicePosition) {
      if (learnState.locked) return;
      learnState.locked = true;

      const currentIndex = learnState.queue[learnState.index];
      const selected = choicePosition === null ? null : learnState.choices[choicePosition];
      const correctPosition = learnState.choices.findIndex((choice) => choice.index === currentIndex);
      const isCorrect = selected?.index === currentIndex;

      learnState.answered += 1;
      learnState.selectedChoice = choicePosition;
      learnState.correctChoice = correctPosition;
      if (isCorrect) {
        learnState.correct += 1;
        learnState.needsNext = false;
        learnState.feedback = "<strong>Correct.</strong>";
      } else if (learnState.round === 1) {
        learnState.missed.push(currentIndex);
      }

      if (!isCorrect) {
        learnState.needsNext = true;
        learnState.feedback = `<strong>Correct answer:</strong> ${escapeHTML(deck[currentIndex].definition)}`;
        renderLearn();
        return;
      }

      renderLearn();
      learnAdvanceTimer = window.setTimeout(advanceLearnQuestion, 650);
    }

    function advanceLearnQuestion() {
      clearLearnAdvanceTimer();
      if (!learnState.locked && !learnState.needsNext) return;

      learnState.index += 1;
      if (learnState.index >= learnState.queue.length) {
        if (learnState.round === 1 && learnState.missed.length) {
          learnState.queue = shuffle(learnState.missed);
          learnState.index = 0;
          learnState.round = 2;
        } else {
          learnState.complete = true;
        }
      }
      prepareLearnQuestion();
    }

    function initMatch() {
      stopMatchTimer();
      const pairCount = Math.min(6, deck.length);
      const selectedIndexes = shuffle(deck.map((_, index) => index)).slice(0, pairCount);
      const cards = selectedIndexes.flatMap((deckIndex) => [
        {
          id: `term-${deckIndex}`,
          pairId: deckIndex,
          type: "term",
          text: deck[deckIndex].term,
          image: "",
          imageAlt: ""
        },
        {
          id: `definition-${deckIndex}`,
          pairId: deckIndex,
          type: "definition",
          text: deck[deckIndex].definition,
          image: deck[deckIndex].image || "",
          imageAlt: deck[deckIndex].imageAlt || ""
        }
      ]);

      Object.assign(matchState, {
        cards: shuffle(cards),
        selected: null,
        matched: new Set(),
        moves: 0,
        seconds: 0,
        locked: false,
        complete: false,
        pairCount
      });
      startMatchTimer();
      renderMatch();
    }

    function startMatchTimer() {
      timerInterval = window.setInterval(() => {
        if (activeMode === "match" && !matchState.complete) {
          matchState.seconds += 1;
          const timer = document.querySelector("#matchTimer");
          if (timer) timer.textContent = formatTime(matchState.seconds);
        }
      }, 1000);
    }

    function stopMatchTimer() {
      if (timerInterval) window.clearInterval(timerInterval);
      timerInterval = null;
    }

    function formatTime(seconds) {
      const minutes = Math.floor(seconds / 60);
      return `${minutes}:${String(seconds % 60).padStart(2, "0")}`;
    }

    function renderMatch() {
      if (matchState.complete) {
        elements.match.innerHTML = completionHTML(
          "Matched!",
          `${matchState.moves} moves · ${formatTime(matchState.seconds)}`,
          "New set",
          "initMatch()"
        );
        setProgress(100);
        return;
      }

      setProgress((matchState.matched.size / matchState.pairCount) * 100);
      elements.match.innerHTML = `
        <div class="match-toolbar">
          <div class="status-group">
            <span class="stat">Moves ${matchState.moves}</span>
            <span class="stat">Time <span id="matchTimer">${formatTime(matchState.seconds)}</span></span>
          </div>
          <button class="btn btn-yellow" type="button" id="newMatchSet">New set</button>
        </div>
        <div class="match-grid">
          ${matchState.cards.map((card) => {
            const matched = matchState.matched.has(card.pairId);
            const selected = matchState.selected?.id === card.id;
            return `
              <button
                class="match-card ${matched ? "matched" : ""} ${selected ? "selected" : ""}"
                type="button"
                data-id="${card.id}"
                ${matched ? "disabled" : ""}
              >
                <span class="mini-badge">${card.type}</span>
                ${card.image ? cardImageHTML(card, "match-card-image", false) : ""}
                <span>${escapeHTML(card.text)}</span>
              </button>
            `;
          }).join("")}
        </div>
      `;

      document.querySelector("#newMatchSet").addEventListener("click", initMatch);
      document.querySelectorAll(".match-card:not(:disabled)").forEach((button) => {
        button.addEventListener("click", () => selectMatchCard(button.dataset.id));
      });
    }

    function selectMatchCard(cardId) {
      if (matchState.locked) return;
      const clicked = matchState.cards.find((card) => card.id === cardId);
      if (!clicked || matchState.matched.has(clicked.pairId)) return;

      if (!matchState.selected) {
        matchState.selected = clicked;
        renderMatch();
        return;
      }

      if (matchState.selected.id === clicked.id) {
        matchState.selected = null;
        renderMatch();
        return;
      }

      // A valid attempt must contain one term and one definition.
      if (matchState.selected.type === clicked.type) {
        matchState.selected = clicked;
        renderMatch();
        return;
      }

      matchState.moves += 1;
      const first = matchState.selected;
      if (first.pairId === clicked.pairId) {
        matchState.matched.add(clicked.pairId);
        matchState.selected = null;
        if (matchState.matched.size === matchState.pairCount) {
          matchState.complete = true;
          stopMatchTimer();
        }
        renderMatch();
        return;
      }

      matchState.locked = true;
      const firstButton = document.querySelector(`[data-id="${CSS.escape(first.id)}"]`);
      const secondButton = document.querySelector(`[data-id="${CSS.escape(clicked.id)}"]`);
      firstButton?.classList.add("wrong");
      secondButton?.classList.add("wrong");

      window.setTimeout(() => {
        matchState.selected = null;
        matchState.locked = false;
        renderMatch();
      }, 500);
    }

    function initTest() {
      const questions = buildTestQuestions();
      Object.assign(testState, {
        questions,
        matchChoices: buildTestMatchChoices(questions),
        selectedMatchValue: null,
        submitted: false
      });
      renderTest();
    }

    function buildTestQuestions() {
      const questionTypes = ["multipleChoice", "trueFalse", "match"];
      const shuffledIndexes = shuffle(deck.map((_, index) => index));

      return shuffledIndexes.map((cardIndex, questionIndex) => {
        const type = questionTypes[questionIndex % questionTypes.length];
        if (type === "trueFalse") return buildTrueFalseQuestion(cardIndex, questionIndex);
        if (type === "match") return buildMatchQuestion(cardIndex, questionIndex);
        return buildMultipleChoiceQuestion(cardIndex, questionIndex);
      });
    }

    function getDistractorDefinitions(cardIndex, count = 3) {
      return shuffle(
        deck.map((card, index) => ({
          label: card.definition,
          cardIndex: index
        })).filter((choice) => choice.cardIndex !== cardIndex)
      ).slice(0, Math.min(count, deck.length - 1));
    }

    function buildMultipleChoiceQuestion(cardIndex, questionIndex) {
      const choices = shuffle([
        {
          label: deck[cardIndex].definition,
          value: String(cardIndex),
          cardIndex
        },
        ...getDistractorDefinitions(cardIndex).map((choice) => ({
          label: choice.label,
          value: String(choice.cardIndex),
          cardIndex: choice.cardIndex
        }))
      ]);

      return {
        id: `test-${questionIndex}`,
        type: "multipleChoice",
        typeLabel: "Multiple choice",
        cardIndex,
        prompt: `What is the definition of ${deck[cardIndex].term}?`,
        choices,
        correctValue: String(cardIndex),
        userAnswer: ""
      };
    }

    function buildTrueFalseQuestion(cardIndex, questionIndex) {
      const shouldBeTrue = Math.random() >= 0.5 || deck.length < 2;
      const wrongDefinition = getDistractorDefinitions(cardIndex, 1)[0];
      const shownDefinition = shouldBeTrue
        ? deck[cardIndex].definition
        : wrongDefinition?.label || deck[cardIndex].definition;

      return {
        id: `test-${questionIndex}`,
        type: "trueFalse",
        typeLabel: "True / false",
        cardIndex,
        prompt: `${deck[cardIndex].term}: ${shownDefinition}`,
        choices: [
          { label: "True", value: "true" },
          { label: "False", value: "false" }
        ],
        correctValue: String(shouldBeTrue),
        userAnswer: ""
      };
    }

    function buildMatchQuestion(cardIndex, questionIndex) {
      return {
        id: `test-${questionIndex}`,
        type: "match",
        typeLabel: "Match",
        cardIndex,
        prompt: `Match ${deck[cardIndex].term} to the correct definition.`,
        choices: [],
        correctValue: String(cardIndex),
        userAnswer: ""
      };
    }

    function buildTestMatchChoices(questions) {
      return shuffle(questions
        .filter((question) => question.type === "match")
        .map((question) => ({
          label: deck[question.cardIndex].definition,
          value: String(question.cardIndex),
          cardIndex: question.cardIndex
        })));
    }

    function renderTest() {
      if (!testState.questions?.length) {
        initTest();
        return;
      }
      if (testState.submitted) {
        renderTestResults();
        return;
      }

      setProgress(getTestCompletionPercent());
      elements.test.innerHTML = `
        <div class="test-shell">
          <section class="test-intro">
            <div>
              <h2>Test</h2>
              <p>${deck.length} questions pulled from this deck. Mixed multiple choice, true/false, and match.</p>
            </div>
            <div class="status-group">
              <span class="stat" id="testAnsweredStat">${getAnsweredTestCount()} / ${testState.questions.length} answered</span>
              <span class="stat">Submit for results</span>
            </div>
          </section>
          ${testQuestionListHTML()}
          <div class="test-actions">
            <button class="btn btn-dark" type="button" id="submitTestButton">Submit test</button>
            <button class="btn" type="button" id="resetTestButton">New test</button>
          </div>
        </div>
      `;

      document.querySelectorAll("input[data-test-question]").forEach((control) => {
        control.addEventListener("change", () => {
          const question = testState.questions[Number(control.dataset.testQuestion)];
          question.userAnswer = control.value;
          updateTestAnsweredDisplay();
        });
      });
      bindTestMatchDrag();

      document.querySelector("#submitTestButton").addEventListener("click", submitTest);
      document.querySelector("#resetTestButton").addEventListener("click", initTest);
    }

    function testQuestionListHTML() {
      const regularQuestions = testState.questions
        .map((question, index) => ({ question, index }))
        .filter(({ question }) => question.type !== "match");
      const matchQuestions = testState.questions
        .map((question, index) => ({ question, index }))
        .filter(({ question }) => question.type === "match");

      return `
        ${regularQuestions.map(({ question, index }) => testQuestionHTML(question, index)).join("")}
        ${testMatchSectionHTML(matchQuestions)}
      `;
    }

    function testQuestionHTML(question, index) {
      return `
        <article class="test-card">
          <div class="test-question-header">
            <strong>Question ${index + 1}</strong>
            <span class="mini-badge">${escapeHTML(question.typeLabel)}</span>
          </div>
          <p class="test-prompt">${escapeHTML(question.prompt)}</p>
          ${testChoiceHTML(question, index)}
        </article>
      `;
    }

    function testChoiceHTML(question, index) {
      return `
        <div class="test-options">
          ${question.choices.map((choice) => `
            <label class="test-option">
              <input
                type="radio"
                name="${escapeHTML(question.id)}"
                value="${escapeHTML(choice.value)}"
                data-test-question="${index}"
                ${question.userAnswer === choice.value ? "checked" : ""}
              >
              <span>${escapeHTML(choice.label)}</span>
            </label>
          `).join("")}
        </div>
      `;
    }

    function testMatchSectionHTML(matchQuestions) {
      if (!matchQuestions.length) return "";

      const usedValues = new Set(matchQuestions
        .map(({ question }) => question.userAnswer)
        .filter(Boolean));
      const bankChoices = testState.matchChoices.filter((choice) => !usedValues.has(choice.value));

      return `
        <article class="test-card test-match-section">
          <div class="test-question-header">
            <strong>Matching section</strong>
            <span class="mini-badge">Match</span>
          </div>
          <div class="test-match-board">
            ${matchQuestions.map(({ question, index }) => {
              const selectedChoice = getTestMatchChoice(question.userAnswer);
              return `
                <div class="test-match-row">
                  <div>
                    <span class="mini-badge">Question ${index + 1}</span>
                    <div class="test-match-term">${escapeHTML(deck[question.cardIndex].term)}</div>
                  </div>
                  <div
                    class="test-drop-zone ${selectedChoice ? "" : "empty"}"
                    data-test-drop="${index}"
                    role="button"
                    tabindex="0"
                    aria-label="Answer for ${escapeHTML(deck[question.cardIndex].term)}"
                  >
                    ${selectedChoice ? testAnswerChipHTML(selectedChoice) : "No answer selected"}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
          <div class="test-answer-bank" data-test-answer-bank>
            ${bankChoices.length ? bankChoices.map((choice) => testAnswerChipHTML(choice)).join("") : '<span class="stat">All answers placed</span>'}
          </div>
        </article>
      `;
    }

    function testAnswerChipHTML(choice) {
      const selected = testState.selectedMatchValue === choice.value;
      return `
        <button
          class="test-answer-chip ${selected ? "selected" : ""}"
          type="button"
          draggable="true"
          data-test-answer-value="${escapeHTML(choice.value)}"
        >
          ${escapeHTML(choice.label)}
        </button>
      `;
    }

    function getTestMatchChoice(value) {
      if (!value) return null;
      return testState.matchChoices.find((choice) => choice.value === value) || null;
    }

    function bindTestMatchDrag() {
      document.querySelectorAll(".test-answer-chip").forEach((chip) => {
        chip.addEventListener("dragstart", (event) => {
          testState.selectedMatchValue = chip.dataset.testAnswerValue;
          chip.classList.add("dragging");
          event.dataTransfer.effectAllowed = "move";
          event.dataTransfer.setData("text/plain", chip.dataset.testAnswerValue);
        });
        chip.addEventListener("dragend", () => {
          chip.classList.remove("dragging");
        });
        chip.addEventListener("click", (event) => {
          event.stopPropagation();
          testState.selectedMatchValue = testState.selectedMatchValue === chip.dataset.testAnswerValue
            ? null
            : chip.dataset.testAnswerValue;
          renderTest();
        });
      });

      document.querySelectorAll(".test-drop-zone").forEach((zone) => {
        zone.addEventListener("dragover", (event) => {
          event.preventDefault();
          zone.classList.add("drag-over");
        });
        zone.addEventListener("dragleave", () => {
          zone.classList.remove("drag-over");
        });
        zone.addEventListener("drop", (event) => {
          event.preventDefault();
          zone.classList.remove("drag-over");
          const answerValue = event.dataTransfer.getData("text/plain") || testState.selectedMatchValue;
          assignTestMatchAnswer(Number(zone.dataset.testDrop), answerValue);
        });
        zone.addEventListener("click", () => {
          if (testState.selectedMatchValue) {
            assignTestMatchAnswer(Number(zone.dataset.testDrop), testState.selectedMatchValue);
          }
        });
        zone.addEventListener("keydown", (event) => {
          if ((event.key === "Enter" || event.key === " ") && testState.selectedMatchValue) {
            event.preventDefault();
            assignTestMatchAnswer(Number(zone.dataset.testDrop), testState.selectedMatchValue);
          }
        });
      });

      const bank = document.querySelector("[data-test-answer-bank]");
      if (!bank) return;

      bank.addEventListener("dragover", (event) => {
        event.preventDefault();
        bank.classList.add("drag-over");
      });
      bank.addEventListener("dragleave", () => {
        bank.classList.remove("drag-over");
      });
      bank.addEventListener("drop", (event) => {
        event.preventDefault();
        bank.classList.remove("drag-over");
        const answerValue = event.dataTransfer.getData("text/plain") || testState.selectedMatchValue;
        clearTestMatchAnswer(answerValue);
      });
    }

    function assignTestMatchAnswer(questionIndex, answerValue) {
      if (!answerValue) return;

      testState.questions.forEach((question) => {
        if (question.type === "match" && question.userAnswer === answerValue) {
          question.userAnswer = "";
        }
      });

      testState.questions[questionIndex].userAnswer = answerValue;
      testState.selectedMatchValue = null;
      renderTest();
    }

    function clearTestMatchAnswer(answerValue) {
      if (!answerValue) return;

      testState.questions.forEach((question) => {
        if (question.type === "match" && question.userAnswer === answerValue) {
          question.userAnswer = "";
        }
      });

      testState.selectedMatchValue = null;
      renderTest();
    }

    function updateTestAnsweredDisplay() {
      setProgress(getTestCompletionPercent());
      const answeredStat = document.querySelector("#testAnsweredStat");
      if (answeredStat) answeredStat.textContent = `${getAnsweredTestCount()} / ${testState.questions.length} answered`;
    }

    function submitTest() {
      testState.submitted = true;
      renderTestResults();
      elements.test.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function getAnsweredTestCount() {
      return testState.questions.filter((question) => question.userAnswer !== "").length;
    }

    function getTestCompletionPercent() {
      if (!testState.questions?.length) return 0;
      return (getAnsweredTestCount() / testState.questions.length) * 100;
    }

    function getTestResults() {
      const questions = testState.questions || [];
      const correct = questions.filter((question) => isTestQuestionCorrect(question)).length;
      const byType = ["multipleChoice", "trueFalse", "match"].map((type) => {
        const typeQuestions = questions.filter((question) => question.type === type);
        const typeCorrect = typeQuestions.filter((question) => isTestQuestionCorrect(question)).length;
        return {
          type,
          label: typeQuestions[0]?.typeLabel || type,
          correct: typeCorrect,
          total: typeQuestions.length
        };
      });

      return {
        correct,
        total: questions.length,
        percent: questions.length ? Math.round((correct / questions.length) * 100) : 0,
        byType
      };
    }

    function isTestQuestionCorrect(question) {
      return question.userAnswer !== "" && question.userAnswer === question.correctValue;
    }

    function getTestAnswerLabel(question, value) {
      if (value === "") return "No answer";
      const choice = question.choices.find((item) => item.value === value);
      return choice?.label || value;
    }

    function renderTestResults() {
      const results = getTestResults();
      setProgress(100);
      elements.test.innerHTML = `
        <section class="test-results">
          <h2>${results.percent}% score</h2>
          <p>${results.correct} correct out of ${results.total} questions.</p>
          <div class="test-score">
            <span class="stat">Total ${results.correct} / ${results.total}</span>
            ${results.byType.map((item) => `
              <span class="stat">${escapeHTML(item.label)} ${item.correct} / ${item.total}</span>
            `).join("")}
          </div>
          <div class="test-result-actions">
            <button class="btn btn-yellow" type="button" id="retakeTestButton">Retake test</button>
            <button class="btn btn-dark" type="button" id="backToCardsFromTest">Return to flashcards</button>
          </div>
          <div class="test-review">
            ${testState.questions.map((question, index) => {
              const correct = isTestQuestionCorrect(question);
              return `
                <article class="test-review-item ${correct ? "correct" : "wrong"}">
                  <h3>${index + 1}. ${escapeHTML(question.typeLabel)} · ${correct ? "Correct" : "Missed"}</h3>
                  <p>${escapeHTML(question.prompt)}</p>
                  <p><strong>Your answer:</strong> ${escapeHTML(getTestAnswerLabel(question, question.userAnswer))}</p>
                  <p><strong>Correct answer:</strong> ${escapeHTML(getTestAnswerLabel(question, question.correctValue))}</p>
                </article>
              `;
            }).join("")}
          </div>
        </section>
      `;

      document.querySelector("#retakeTestButton").addEventListener("click", initTest);
      document.querySelector("#backToCardsFromTest").addEventListener("click", () => switchMode("flashcards"));
    }

    function completionHTML(title, detail, buttonLabel, action) {
      return `
        <div class="completion">
          <div class="completion-mark">✓</div>
          <h2>${escapeHTML(title)}</h2>
          <p>${escapeHTML(detail)}</p>
          <button class="btn btn-dark" type="button" onclick="${action}">${escapeHTML(buttonLabel)}</button>
        </div>
      `;
    }

    function switchMode(mode) {
      activeMode = mode;
      elements.shell.classList.toggle("stack-shell", mode === "stack");
      elements.tabs.forEach((tab) => {
        const isActive = tab.dataset.mode === mode;
        tab.classList.toggle("active", isActive);
        tab.setAttribute("aria-selected", String(isActive));
      });
      document.querySelectorAll(".mode-panel").forEach((panel) => panel.classList.remove("active"));
      elements[mode].classList.add("active");

      if (mode !== "match") stopMatchTimer();
      if (mode !== "stack" && stackGame) stackGame.pause();
      if (mode === "flashcards") renderFlashcards();
      if (mode === "learn") renderLearn();
      if (mode === "match") {
        if (!matchState.cards || matchState.complete) initMatch();
        else {
          startMatchTimer();
          renderMatch();
        }
      }
      if (mode === "test") {
        if (!testState.questions) initTest();
        else renderTest();
      }
      if (mode === "viewCards") renderViewCards();
      if (mode === "stack") {
        ensureStackGame();
      }
    }

    function ensureStackGame() {
      if (!window.StudyBroStack || !window.StudyBroStack.create) {
        elements.stack.innerHTML = completionHTML(
          "Stack unavailable",
          "Matter.js or the Stack game script did not load.",
          "Back to cards",
          "switchMode('flashcards')"
        );
        setProgress(0);
        return;
      }

      if (!stackGame) {
        stackGame = window.StudyBroStack.create({
          deck,
          panel: elements.stack,
          onProgress: setProgress,
          onExit: () => switchMode("flashcards")
        });
        stackGame.start();
        return;
      }

      stackGame.resume();
    }

    elements.tabs.forEach((tab) => {
      tab.addEventListener("click", () => switchMode(tab.dataset.mode));
    });
    document.addEventListener("keydown", handleFlashcardShortcut);

    window.studyBroSwitchMode = switchMode;

    initThemeToggle();
    initImageViewer();
    loadDeck().then(startApp);
  </script>
  <script src="vendor/matter.min.js"></script>
  <script src="physics.js"></script>
  <script src="stack.js"></script>
</body>
</html>
